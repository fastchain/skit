### eturnal STUN/TURN server configuration
### https://eturnal.net/documentation/

eturnal:
  ## -------------------------------------------------------------------------
  ## Shared TURN credential secret.
  ## MUST match mod_stun_disco.secret in ejabberd.yml exactly.
  ## -------------------------------------------------------------------------
  secret: "CzvWdmwpqxFlgtN7Q87u92jq7xU6FndG"

  ## Public IPv4 address clients connect to for relay traffic.
  ## Change to the actual public IP of this host.
  relay_ipv4_addr: "65.109.236.51"

  ## Port range reserved for TURN relay allocation.
  ## Ensure these UDP ports are open in your firewall / security group.
  relay_min_port: 49152
  relay_max_port: 65535

  ## -------------------------------------------------------------------------
  ## Listeners
  ## -------------------------------------------------------------------------
  listen:
    ## Plain STUN/TURN — UDP (main transport for WebRTC ICE)
    -
      ip: "::"
      port: 3478
      transport: udp

    ## Plain STUN/TURN — TCP (fallback when UDP is blocked)
    -
      ip: "::"
      port: 3478
      transport: tcp

    ## TLS TURN — TCP (encrypted fallback; certificate provided by certbot)
    -
      ip: "::"
      port: 5349
      transport: tls

  ## TLS certificate files written by the certbot service into ./certs/.
  ## Mounted read-only at /etc/eturnal/tls inside the container.
  tls_crt_file: /etc/eturnal/tls/db.dfsf.org.pem
  tls_key_file: /etc/eturnal/tls/db.dfsf.org.pem

  log_level: info
  log_rotate_size: 10485760   # 10 MiB
  log_rotate_count: 3

  modules:
    mod_log_stun: {}
