services:
  postgres:
    image: postgres:16-alpine
    container_name: ejabberd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ejabberd}
      POSTGRES_USER: ${POSTGRES_USER:-ejabberd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ejabberd}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      # Schema is loaded only on the very first startup of the DB volume.
      # Generate it with ./fetch-schema.sh before the first `docker compose up`.
      - ./sql/pg.new.sql:/docker-entrypoint-initdb.d/10-ejabberd.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ejabberd} -d ${POSTGRES_DB:-ejabberd}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # certbot — obtains and auto-renews a Let's Encrypt TLS certificate for
  # db.dfsf.org using the HTTP-01 standalone challenge (port 80).
  #
  # First-run order: start certbot before ejabberd so the cert bundle exists
  # when ejabberd reads it:
  #   docker compose up -d certbot
  #   # wait ~30 s for the certificate to be issued, then:
  #   docker compose up -d
  #
  # After renewal ejabberd must pick up the new cert. Reload it online with:
  #   docker exec ejabberd ejabberdctl reload_config
  # or simply: docker compose restart ejabberd
  #
  # Requirements:
  #   - Port 80 must be reachable from the internet (for the ACME challenge).
  #   - ACME_EMAIL must be set in .env (or it defaults to admin@db.dfsf.org).
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./certbot-etc:/etc/letsencrypt
      - ./certbot-lib:/var/lib/letsencrypt
      - ./certs:/certs
    environment:
      - ACME_EMAIL=${ACME_EMAIL:-admin@db.dfsf.org}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        DOMAIN=db.dfsf.org
        LIVE=/etc/letsencrypt/live/$$DOMAIN

        # Write all cert files consumed by ejabberd and eturnal.
        # ejabberd needs a combined PEM (fullchain + key in one file).
        # eturnal (TLS-TURN) needs the files separate.
        bundle() {
          cat "$$LIVE/fullchain.pem" "$$LIVE/privkey.pem" > "/certs/$$DOMAIN.pem"
          cp  "$$LIVE/fullchain.pem" "/certs/fullchain.pem"
          cp  "$$LIVE/privkey.pem"   "/certs/privkey.pem"
          chmod 640 "/certs/$$DOMAIN.pem" "/certs/fullchain.pem" "/certs/privkey.pem"
          echo "certbot: cert files written to /certs/"
        }

        echo "certbot: requesting certificate for $$DOMAIN (email: $$ACME_EMAIL)"
        certbot certonly \
          --standalone \
          --non-interactive \
          --agree-tos \
          --email "$$ACME_EMAIL" \
          -d "$$DOMAIN" \
          --keep-until-expiring

        [ -d "$$LIVE" ] && bundle

        # Check for renewal every 12 hours; Let's Encrypt renews when
        # fewer than 30 days remain on the certificate.
        trap exit TERM INT
        while :; do
          sleep 12h & wait $$!
          certbot renew \
            --standalone \
            --quiet \
            --post-hook "
              cat /etc/letsencrypt/live/db.dfsf.org/fullchain.pem \
                  /etc/letsencrypt/live/db.dfsf.org/privkey.pem \
                  > /certs/db.dfsf.org.pem
              cp /etc/letsencrypt/live/db.dfsf.org/fullchain.pem /certs/fullchain.pem
              cp /etc/letsencrypt/live/db.dfsf.org/privkey.pem   /certs/privkey.pem
              chmod 640 /certs/db.dfsf.org.pem /certs/fullchain.pem /certs/privkey.pem
              echo certbot: renewed cert files written
            "
        done

  ejabberd:
    image: ghcr.io/processone/ejabberd:latest
    container_name: ejabberd
    restart: unless-stopped
    hostname: db.dfsf.org
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # XMPP client-to-server (STARTTLS)
      - "5222:5222"
      # XMPP client-to-server (Direct TLS)
      - "5223:5223"
      # XMPP server-to-server
      - "5269:5269"
      # HTTPS (BOSH, WebSocket, admin, file upload)
      - "5443:5443"
      # Note: STUN/TURN (3478, 5349) is handled by the eturnal service.
    volumes:
      - ./conf/ejabberd.yml:/opt/ejabberd/conf/ejabberd.yml:ro
      - ./certs:/opt/ejabberd/conf/certs:ro
      - ./ejabberd-database:/opt/ejabberd/database
      - ./ejabberd-logs:/opt/ejabberd/logs
      - ./ejabberd-upload:/opt/ejabberd/upload
    environment:
      - ERLANG_NODE=ejabberd@localhost
      - EJABBERD_MACROS_FILE=/opt/ejabberd/conf/ejabberd.yml
    healthcheck:
      test: ["CMD", "ejabberdctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  # ---------------------------------------------------------------------------
  # eturnal — dedicated STUN/TURN server for WebRTC ICE.
  #
  # Uses network_mode: host so that the relay port range (49152–65535 UDP) and
  # the main STUN/TURN ports (3478 UDP+TCP, 5349 TLS) are directly on the host
  # without needing thousands of Docker port mappings.
  #
  # Firewall requirements (open inbound on the host):
  #   UDP  3478        — STUN/TURN plain
  #   TCP  3478        — STUN/TURN plain (fallback)
  #   TCP  5349        — TURN over TLS
  #   UDP  49152-65535 — TURN relay traffic
  #
  # The shared secret and relay IP are configured in conf/eturnal.yml.
  # TLS cert files are written by the certbot service into ./certs/.
  # ---------------------------------------------------------------------------
  eturnal:
    image: ghcr.io/processone/eturnal:latest
    container_name: eturnal
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./conf/eturnal.yml:/etc/eturnal/eturnal.yml:ro
      - ./certs:/etc/eturnal/tls:ro

